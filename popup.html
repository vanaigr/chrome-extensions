<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 340px;
  font-family: system-ui, sans-serif;
  font-size: 13px;
  color: #1a1a1a;
  padding: 16px;
}
h2 {
  font-size: 15px;
  margin-bottom: 12px;
}
.add-row {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.add-row input[type="text"] {
  flex: 1;
  padding: 6px 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 13px;
}
.add-row button {
  padding: 6px 12px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}
.add-row button:hover { background: #1d4ed8; }
.radio-row {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}
.radio-row label {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}
.list {
  max-height: 260px;
  overflow-y: auto;
}
.item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 8px;
  border-radius: 4px;
}
.item:nth-child(odd) { background: #f5f5f5; }
.item-label {
  flex: 1;
  word-break: break-all;
}
.item-type {
  color: #888;
  font-size: 11px;
  margin-left: 6px;
  flex-shrink: 0;
}
.item button {
  margin-left: 8px;
  background: none;
  border: none;
  color: #dc2626;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  flex-shrink: 0;
}
.item button:hover { color: #991b1b; }
.empty {
  color: #999;
  text-align: center;
  padding: 20px 0;
}
</style>
</head>
<body>
  <h2>Excluded Sites</h2>
  <div class="radio-row">
    <label><input type="radio" name="kind" value="domain" checked> Domain</label>
    <label><input type="radio" name="kind" value="regex"> Regex</label>
  </div>
  <div class="add-row">
    <input type="text" id="input" placeholder="e.g. example.com or ^https://mail\.">
    <button id="add-btn">Add</button>
  </div>
  <div class="list" id="list"></div>
  <script src="popup.js"></script>
</body>
</html>
