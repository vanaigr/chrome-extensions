<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, sans-serif; padding: 12px; margin: 0; }
    h1 { font-size: 14px; margin: 0 0 8px 0; }
    .row {
        margin: 6px 0;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
    }
    .row label {
        display: block;
        color: #555;
        margin-bottom: 2px;
    }
    .row .val {
        background: #f4f4f4;
        padding: 10px 6px;
    }
    button { width: 100%; padding: 8px; margin-top: 10px; font-size: 13px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: default; }
    #status { margin-top: 8px; font-size: 12px; min-height: 16px; }
    #status.ok { color: #0a7a2a; }
    #status.err { color: #b00020; }
    .ac-wrap { position: relative; }
    .ac-wrap > input { width: 100%; box-sizing: border-box; }
    .ac-list {
        position: absolute;
        left: 0; right: 0; top: 100%;
        background: #fff;
        border: 1px solid #ccc;
        max-height: 220px;
        overflow-y: auto;
        z-index: 10;
        font-size: 12px;
        display: none;
    }
    .ac-list.open { display: block; }
    .ac-item { padding: 10px 8px; cursor: pointer; }
    .ac-item.active, .ac-item:hover { background: #e8f0fe; }
  </style>
</head>
<body>
  <div class="row">
    <label>Title</label>
    <input id="title" class="val">
  </div>
  <div class="row">
    <label>Target location</label>
    <div class="ac-wrap">
      <input id="targetLocation" class="val" autocomplete="off">
      <div id="targetLocationList" class="ac-list"></div>
    </div>
  </div>
  <button id="generate">Generate</button>
  <div id="status"></div>
  <script src="sidepanel.js"></script>
</body>
</html>
